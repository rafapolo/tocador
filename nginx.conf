worker_processes auto;
worker_rlimit_nofile 65535;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # Rate limiting only for audio (anti-scraping) and sensitive API endpoints
    limit_req_zone  $binary_remote_addr zone=audio:10m  rate=5r/s;
    limit_req_zone  $binary_remote_addr zone=api:10m    rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    proxy_cache_path /var/cache/nginx/images
        levels=1:2
        keys_zone=images:20m
        max_size=2g
        inactive=30d
        use_temp_path=off;

    # Persistent keepalive pool nginx → node
    upstream node {
        server 127.0.0.1:9002;
        keepalive 128;
    }

    server {
        listen 9001;

        location = /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # report-error: very restricted
        location = /report-error {
            limit_req  zone=api burst=3 nodelay;
            limit_conn perip 2;
            proxy_pass http://node;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # Audio: rate-limited per IP to prevent bulk downloading
        location ~* \.(mp3|mp4|m4a)$ {
            limit_req  zone=audio burst=8 nodelay;
            limit_conn perip 6;
            proxy_pass http://node;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_read_timeout 120s;
        }

        # Gzipped data files: album indexes, atlas map — never cached in nginx.
        # Browser sends If-None-Match on every load; S3 returns 304 if unchanged,
        # 200 with new content the moment a new file is uploaded. Zero lag on deploy.
        location ~* \.gz$ {
            proxy_pass http://node;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # Images: no rate limiting — covers are public and 3d.html loads all at once
        location ~* \.(jpg|jpeg|png|webp)$ {
            proxy_pass http://node;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_cache            images;
            proxy_cache_key        "$uri";
            proxy_cache_valid      200 30d;
            proxy_cache_valid      any  1m;
            proxy_cache_lock       on;
            proxy_cache_lock_timeout 10s;
            proxy_cache_use_stale  error timeout updating http_500 http_503;
            proxy_cache_background_update on;
            add_header             X-Cache-Status $upstream_cache_status always;
        }

        location / {
            proxy_pass http://node;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_read_timeout 35s;
        }
    }
}
