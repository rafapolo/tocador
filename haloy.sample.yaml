name: your-archive
server: haloy.xn--2dk.xyz
api_token:
  from:
    env: "HALOY_API_TOKEN"
port: 9001
health_check_path: /health
domains:
  - domain: "your-archive.example.com"
env:
  - name: AWS_ACCESS_KEY_ID
    from:
      env: AWS_ACCESS_KEY_ID
  - name: AWS_SECRET_ACCESS_KEY
    from:
      env: AWS_SECRET_ACCESS_KEY
  - name: S3_ENDPOINT
    from:
      env: S3_ENDPOINT
  - name: S3_BUCKET
    from:
      env: S3_BUCKET
